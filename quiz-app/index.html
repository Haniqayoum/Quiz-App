<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
<link rel="stylesheet" href="style.css">
    </head>
<body>
<header class="p-4">
<h3 class="heading">Javascript Quiz</h3>
<div class="float-end">
    <div class="profilePhoto" onmouseover="showCard() " onmouseleave="hideCard()">
<img src="./assets/Pfp With Flower.jpg" id="profilePhotoImg" alt="profilepic">
<input type="file" id="profilePhotoInput" accept="image/" style="display: none;">  
</div>
</div>

</header>
<div id="card" class="float-end card mt-1 me-2 mt-0" >

</div>
<div id="container" class="container mt-3">
<div class="mt-3 container card" id="result-container" style="display: none;"><b>Result</b></div>
<ul class="list-group list-group-flush">
    <li id="score" class="list-group-item"></li>
</ul>
</div>
<script src="app.js"></script>
</body>
</html>
