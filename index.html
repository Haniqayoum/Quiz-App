<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container card mt-5 w-50">
    <form class="row g-3 p-3 " onsubmit="register()">
        <div class="col-md-12">
<label for="name" class="form-label" >Name</label>
<input type="text" class="form-control" required id="name">
        </div>
        <div class="col-md-6">
        <label for="phonenumber " class="form-label">Roll Number</label>
        <input type="number" class="form-control" id="phoneNumber" required>
        </div>
        <div class="col-md-6">
            <label for="paswword" class="form-label" >Password</label>
        <input type="password" name="password" id="password" required class="form-control">
        </div>
        <div class="col-md-6">
            <label for="cpaswword" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="cPassword" required>
        </div>
<div class="col-12"> 
    <button type="submit" class="btn btn-primary">Sign-in</button>
</div>
<p>Already have an account <a href="./login.html">Login</a></p>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="app.js"></script>
</body>
</html>
